name: Build

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [ main ]
    paths: [ 'build.sh', 'Dockerfile', '.github/workflows/build.yml' ]
  workflow_dispatch:

jobs:

  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      RELEASE: ${{ steps.start_build.outputs.RELEASE }}
    strategy:
      matrix:
        arch: [amd64]
    env:
        ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: amd64
          path: ./*.tar.xz
          archive: false

  build-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        arch: [arm64]
    env:
        ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arm64
          path: ./*.tar.xz
          archive: false

  build-armhf:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        arch: [armhf]
    env:
        ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: armhf
          path: ./*.tar.xz
          archive: false

  build-armel:
    runs-on: ubuntu-24.04-arm
    outputs:
      RELEASE: ${{ steps.start_build.outputs.RELEASE }}
    strategy:
      matrix:
        arch: [armel]
    env:
        ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: armel
          path: ./*.tar.xz
          archive: false

  build-ppc64el:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ppc64el]
    env:
        ARCH: ${{ matrix.arch }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ppc64el
          path: ./*.tar.xz
          archive: false

  push:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, build-armhf, build-armel, build-ppc64el]
    permissions:
      contents: read
      packages: write

    steps:
      
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: arfshl
          password: ${{ secrets.DOCKERPASS }}

      - name: Downcase Repo Name
        run: echo "REPONAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
         path: .
         merge-multiple: true

      - name: DEBUG; Check files
        run: ls -la

      - name: Push to GHCR and Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
            linux/arm/v5
            linux/ppc64le
          tags: |
            ghcr.io/arfshl/devuan:latest
            ghcr.io/arfshl/devuan:${{ needs.build-amd64.outputs.RELEASE }}
            arfshl/devuan:latest
            arfshl/devuan:${{ needs.build-amd64.outputs.RELEASE }}
